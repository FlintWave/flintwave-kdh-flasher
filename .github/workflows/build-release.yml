name: Build Release Binaries

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            artifact: FlintWave-KDH-Flasher-Linux
          - os: windows-latest
            name: Windows
            artifact: FlintWave-KDH-Flasher-Windows
          - os: macos-latest
            name: macOS
            artifact: FlintWave-KDH-Flasher-macOS

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-wxgtk4.0 libfuse2

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyserial requests pyinstaller
          if [ "$RUNNER_OS" = "Linux" ]; then
            python -m pip install --no-deps wxPython --prefer-binary || true
            python -c "import wx; print(f'wxPython {wx.__version__}')" 2>/dev/null || \
              echo "Using system wxPython"
          else
            python -m pip install wxPython --prefer-binary
          fi

      - name: Build binary
        run: pyinstaller build.spec

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/128x128/apps AppDir/usr/share/applications
          cp dist/FlintWave-KDH-Flasher AppDir/usr/bin/
          cp icon_128.png AppDir/usr/share/icons/hicolor/128x128/apps/flintwave-kdh-flasher.png
          cp icon_128.png AppDir/flintwave-kdh-flasher.png
          cat > AppDir/usr/share/applications/flintwave-kdh-flasher.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=FlintWave KDH Flasher
          Exec=FlintWave-KDH-Flasher
          Icon=flintwave-kdh-flasher
          Categories=Utility;HamRadio;
          DESKTOP
          cp AppDir/usr/share/applications/flintwave-kdh-flasher.desktop AppDir/
          ln -sf usr/bin/FlintWave-KDH-Flasher AppDir/AppRun
          curl -sL https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir FlintWave-KDH-Flasher-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/
            *.AppImage

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Package artifacts
        shell: bash
        run: |
          # Linux AppImage
          cp FlintWave-KDH-Flasher-Linux/FlintWave-KDH-Flasher-x86_64.AppImage . 2>/dev/null || \
            (cd FlintWave-KDH-Flasher-Linux/dist && tar czf ../../FlintWave-KDH-Flasher-Linux.tar.gz *)
          # Windows exe
          cp FlintWave-KDH-Flasher-Windows/dist/FlintWave-KDH-Flasher.exe . 2>/dev/null || true
          # macOS
          cd FlintWave-KDH-Flasher-macOS/dist && tar czf ../../FlintWave-KDH-Flasher-macOS.tar.gz * && cd ../..

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          ASSETS=""
          [ -f FlintWave-KDH-Flasher-x86_64.AppImage ] && ASSETS="$ASSETS FlintWave-KDH-Flasher-x86_64.AppImage"
          [ -f FlintWave-KDH-Flasher-Linux.tar.gz ] && ASSETS="$ASSETS FlintWave-KDH-Flasher-Linux.tar.gz"
          [ -f FlintWave-KDH-Flasher.exe ] && ASSETS="$ASSETS FlintWave-KDH-Flasher.exe"
          [ -f FlintWave-KDH-Flasher-macOS.tar.gz ] && ASSETS="$ASSETS FlintWave-KDH-Flasher-macOS.tar.gz"
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes \
            $ASSETS
