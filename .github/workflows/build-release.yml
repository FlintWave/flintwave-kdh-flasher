name: Build Release Binaries

on:
  push:
    tags: ['v*']

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-wxgtk4.0 libfuse2 rpm unrar
          sudo gem install fpm -v 1.15.1
          python -m pip install --upgrade pip
          python -m pip install pyserial "requests>=2.33.0" "urllib3>=2.6.3" "certifi>=2024.8.30" rarfile pyinstaller
          python -m pip install --no-deps wxPython --prefer-binary || true

      - name: Build binary
        run: pyinstaller build.spec

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/128x128/apps AppDir/usr/share/applications
          cp dist/FlintWave-KDH-Flasher AppDir/usr/bin/
          cp icon_128.png AppDir/usr/share/icons/hicolor/128x128/apps/flintwave-kdh-flasher.png
          cp icon_128.png AppDir/flintwave-kdh-flasher.png
          cat > AppDir/flintwave-kdh-flasher.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=FlintWave KDH Flasher
          GenericName=Radio Firmware Flasher
          Comment=Flash firmware to KDH bootloader radios
          Exec=FlintWave-KDH-Flasher
          Icon=flintwave-kdh-flasher
          Categories=Utility;HamRadio;
          Keywords=Hamradio;Firmware;Flasher;Baofeng;BTECH;Radio;
          DESKTOP
          cp AppDir/flintwave-kdh-flasher.desktop AppDir/usr/share/applications/
          ln -sf usr/bin/FlintWave-KDH-Flasher AppDir/AppRun
          curl -sL https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir FlintWave-KDH-Flasher-x86_64.AppImage

      - name: Build .deb
        run: |
          fpm -s dir -t deb \
            --name flintwave-kdh-flasher \
            --version "${{ github.ref_name }}" \
            --description "Cross-platform firmware flasher for KDH bootloader radios" \
            --maintainer "FlintWave Radio Tools <flintwave@tuta.com>" \
            --url "https://github.com/FlintWave/flintwave-kdh-flasher" \
            --license MIT \
            --category utils \
            --depends libgtk-3-0 \
            --depends unrar \
            dist/FlintWave-KDH-Flasher=/usr/bin/FlintWave-KDH-Flasher \
            AppDir/flintwave-kdh-flasher.desktop=/usr/share/applications/flintwave-kdh-flasher.desktop \
            icon_128.png=/usr/share/icons/hicolor/128x128/apps/flintwave-kdh-flasher.png

      - name: Build .rpm
        run: |
          fpm -s dir -t rpm \
            --name flintwave-kdh-flasher \
            --version "${{ github.ref_name }}" \
            --description "Cross-platform firmware flasher for KDH bootloader radios" \
            --maintainer "FlintWave Radio Tools <flintwave@tuta.com>" \
            --url "https://github.com/FlintWave/flintwave-kdh-flasher" \
            --license MIT \
            --category Utilities \
            --depends gtk3 \
            --depends unrar \
            dist/FlintWave-KDH-Flasher=/usr/bin/FlintWave-KDH-Flasher \
            AppDir/flintwave-kdh-flasher.desktop=/usr/share/applications/flintwave-kdh-flasher.desktop \
            icon_128.png=/usr/share/icons/hicolor/128x128/apps/flintwave-kdh-flasher.png

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            FlintWave-KDH-Flasher-x86_64.AppImage
            *.deb
            *.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyserial "requests>=2.33.0" "urllib3>=2.6.3" "certifi>=2024.8.30" rarfile pyinstaller wxPython --prefer-binary

      - name: Download UnRAR
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://www.rarlab.com/rar/unrar-command-7.11.0-x64.zip" -OutFile unrar.zip
          Expand-Archive -Path unrar.zip -DestinationPath unrar_tmp -Force
          Copy-Item unrar_tmp\UnRAR.exe bundled_unrar.exe
          Remove-Item -Recurse unrar_tmp, unrar.zip

      - name: Build binary
        run: pyinstaller build.spec

      - name: Create Inno Setup script
        shell: bash
        run: |
          cat > installer.iss << 'ISS'
          [Setup]
          AppName=FlintWave KDH Flasher
          AppVersion=${{ github.ref_name }}
          AppPublisher=FlintWave Radio Tools
          AppPublisherURL=https://github.com/FlintWave/flintwave-kdh-flasher
          DefaultDirName={autopf}\FlintWave KDH Flasher
          DefaultGroupName=FlintWave KDH Flasher
          OutputDir=.
          OutputBaseFilename=FlintWave-KDH-Flasher-Setup
          Compression=lzma
          SolidCompression=yes
          SetupIconFile=icon.ico

          [Files]
          Source: "dist\FlintWave-KDH-Flasher.exe"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\FlintWave KDH Flasher"; Filename: "{app}\FlintWave-KDH-Flasher.exe"
          Name: "{group}\Uninstall FlintWave KDH Flasher"; Filename: "{uninstallexe}"
          Name: "{commondesktop}\FlintWave KDH Flasher"; Filename: "{app}\FlintWave-KDH-Flasher.exe"

          [Run]
          Filename: "{app}\FlintWave-KDH-Flasher.exe"; Description: "Launch FlintWave KDH Flasher"; Flags: nowait postinstall skipifsilent
          ISS

      - name: Build installer
        run: iscc installer.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            dist/FlintWave-KDH-Flasher.exe
            FlintWave-KDH-Flasher-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyserial "requests>=2.33.0" "urllib3>=2.6.3" "certifi>=2024.8.30" rarfile pyinstaller wxPython --prefer-binary
          brew install create-dmg unar

      - name: Bundle unrar
        run: cp "$(which unar)" bundled_unrar

      - name: Build binary
        run: pyinstaller build.spec

      - name: Build DMG
        run: |
          create-dmg \
            --volname "FlintWave KDH Flasher" \
            --window-size 500 300 \
            --icon-size 80 \
            --icon "FlintWave KDH Flasher.app" 150 150 \
            --app-drop-link 350 150 \
            "FlintWave-KDH-Flasher.dmg" \
            "dist/FlintWave KDH Flasher.app" \
          || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            FlintWave-KDH-Flasher.dmg
            dist/

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.dmg" | sort

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          ASSETS=""
          for f in \
            linux-packages/FlintWave-KDH-Flasher-x86_64.AppImage \
            linux-packages/*.deb \
            linux-packages/*.rpm \
            windows-packages/FlintWave-KDH-Flasher-Setup.exe \
            windows-packages/dist/FlintWave-KDH-Flasher.exe \
            macos-packages/FlintWave-KDH-Flasher.dmg \
          ; do
            [ -f "$f" ] && ASSETS="$ASSETS $f"
          done
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG_NAME" \
            --generate-notes \
            $ASSETS
