name: Build Release Binaries

on:
  push:
    tags: ['v*']

# A duplicate workflow trigger for the same tag (GitHub occasionally fires
# twice in quick succession on a tag push) used to race two `release` jobs
# against each other and the second would fail with "release already exists".
# Coalesce to one run per tag.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

# Least-privilege default for every job. The `release` job overrides this
# locally with `contents: write` so it can publish the GitHub Release.
permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-wxgtk4.0 libfuse2 rpm unrar
          sudo gem install fpm -v 1.15.1
          python -m pip install --upgrade pip
          python -m pip install pyserial "requests>=2.33.0" "urllib3>=2.6.3" "certifi>=2024.8.30" rarfile pyinstaller
          python -m pip install --no-deps wxPython --prefer-binary || true

      - name: Build binary
        run: pyinstaller build.spec

      - name: Build AppImage
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/icons/hicolor/128x128/apps AppDir/usr/share/applications
          cp dist/FlintWave-Flash AppDir/usr/bin/
          cp icon_128.png AppDir/usr/share/icons/hicolor/128x128/apps/flintwave-flash.png
          cp icon_128.png AppDir/flintwave-flash.png
          cat > AppDir/flintwave-flash.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=FlintWave Flash
          GenericName=Radio Firmware Flasher
          Comment=Flash firmware to KDH bootloader radios
          Exec=FlintWave-Flash
          Icon=flintwave-flash
          Categories=Utility;HamRadio;
          Keywords=Hamradio;Firmware;Flasher;Baofeng;BTECH;Radio;
          DESKTOP
          cp AppDir/flintwave-flash.desktop AppDir/usr/share/applications/
          ln -sf usr/bin/FlintWave-Flash AppDir/AppRun
          curl -sL https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -o appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir FlintWave-Flash-x86_64.AppImage

      - name: Build .deb
        run: |
          fpm -s dir -t deb \
            --name flintwave-flash \
            --version "${{ github.ref_name }}" \
            --description "Cross-platform firmware flasher for KDH bootloader radios" \
            --maintainer "FlintWave Radio Tools <flintwave@tuta.com>" \
            --url "https://github.com/FlintWave/flintwave-kdh-flasher" \
            --license GPL-3.0 \
            --category utils \
            --depends libgtk-3-0 \
            --depends unrar \
            dist/FlintWave-Flash=/usr/bin/FlintWave-Flash \
            AppDir/flintwave-flash.desktop=/usr/share/applications/flintwave-flash.desktop \
            icon_128.png=/usr/share/icons/hicolor/128x128/apps/flintwave-flash.png

      - name: Build .rpm
        run: |
          fpm -s dir -t rpm \
            --name flintwave-flash \
            --version "${{ github.ref_name }}" \
            --description "Cross-platform firmware flasher for KDH bootloader radios" \
            --maintainer "FlintWave Radio Tools <flintwave@tuta.com>" \
            --url "https://github.com/FlintWave/flintwave-kdh-flasher" \
            --license GPL-3.0 \
            --category Utilities \
            --depends gtk3 \
            --depends unrar \
            dist/FlintWave-Flash=/usr/bin/FlintWave-Flash \
            AppDir/flintwave-flash.desktop=/usr/share/applications/flintwave-flash.desktop \
            icon_128.png=/usr/share/icons/hicolor/128x128/apps/flintwave-flash.png

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            FlintWave-Flash-x86_64.AppImage
            *.deb
            *.rpm

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyserial "requests>=2.33.0" "urllib3>=2.6.3" "certifi>=2024.8.30" rarfile pyinstaller wxPython --prefer-binary

      - name: Download UnRAR
        shell: bash
        run: |
          curl -sL https://www.rarlab.com/rar/unrarw64.exe -o unrarw64.exe
          "/c/Program Files/7-Zip/7z.exe" e unrarw64.exe UnRAR.exe -y
          mv UnRAR.exe bundled_unrar.exe
          rm -f unrarw64.exe

      - name: Build binary
        run: pyinstaller build.spec

      - name: Create Inno Setup script
        shell: bash
        run: |
          cat > installer.iss << 'ISS'
          [Setup]
          AppName=FlintWave Flash
          AppVersion=${{ github.ref_name }}
          AppPublisher=FlintWave Radio Tools
          AppPublisherURL=https://github.com/FlintWave/flintwave-kdh-flasher
          DefaultDirName={autopf}\FlintWave Flash
          DefaultGroupName=FlintWave Flash
          OutputDir=.
          OutputBaseFilename=FlintWave-Flash-Setup
          Compression=lzma
          SolidCompression=yes
          SetupIconFile=icon.ico

          [Files]
          Source: "dist\FlintWave-Flash.exe"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\FlintWave Flash"; Filename: "{app}\FlintWave-Flash.exe"
          Name: "{group}\Uninstall FlintWave Flash"; Filename: "{uninstallexe}"
          Name: "{commondesktop}\FlintWave Flash"; Filename: "{app}\FlintWave-Flash.exe"

          [Run]
          Filename: "{app}\FlintWave-Flash.exe"; Description: "Launch FlintWave Flash"; Flags: nowait postinstall skipifsilent
          ISS

      - name: Build installer
        run: iscc installer.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            dist/FlintWave-Flash.exe
            FlintWave-Flash-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyserial "requests>=2.33.0" "urllib3>=2.6.3" "certifi>=2024.8.30" rarfile pyinstaller wxPython --prefer-binary
          brew install create-dmg unar

      - name: Bundle unrar
        run: cp "$(which unar)" bundled_unrar

      - name: Build binary
        run: pyinstaller build.spec

      - name: Build DMG
        run: |
          create-dmg \
            --volname "FlintWave Flash" \
            --window-size 500 300 \
            --icon-size 80 \
            --icon "FlintWave Flash.app" 150 150 \
            --app-drop-link 350 150 \
            "FlintWave-Flash.dmg" \
            "dist/FlintWave Flash.app" \
          || true

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |
            FlintWave-Flash.dmg
            dist/

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: List artifacts
        run: find . -type f -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.exe" -o -name "*.dmg" | sort

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          ASSETS=""
          for f in \
            linux-packages/FlintWave-Flash-x86_64.AppImage \
            linux-packages/*.deb \
            linux-packages/*.rpm \
            windows-packages/FlintWave-Flash-Setup.exe \
            windows-packages/dist/FlintWave-Flash.exe \
            macos-packages/FlintWave-Flash.dmg \
          ; do
            [ -f "$f" ] && ASSETS="$ASSETS $f"
          done
          # Idempotent: if a previous workflow run already published this tag
          # (e.g. duplicate trigger, manual re-run, or the concurrency block
          # above let a second run through), update the existing release in
          # place instead of failing with "release already exists".
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG_NAME exists; uploading assets with --clobber"
            gh release upload "$TAG_NAME" $ASSETS \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG_NAME" \
              --generate-notes \
              $ASSETS
          fi
